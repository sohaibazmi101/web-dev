<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To formatting Documents</title>
</head>
<body style="text-align: center; background-color: antiquewhite;">

    <b>This text is bold</b><br>
    <strong">This text is strong</strong><br>
    <i style="background-color: blue; color: white;">This Text is italic</i><br>
    <em>This is emphasized Text</em><br>
    <mark>This is marked Text</mark><br>
    <small>This is small Text</small><br>
    <del>Deleted Text</del><br>
    <ins style="background-color: red; color: white;">Inserted Text</ins><br>
    <sub>Subscipt Text</sub><br>
    <sup>Superscript TExt</sup>
    <p>H<sub>2</sub>O</p>
    <p>Do not forget to buy <mark>Milk </mark>Today</p>
    <p>My favarite color is <del>blue</del> red.</p>
</body>
</html>
